{% extends 'base.html' %}
{% block content %}
<div class="auth-wrapper">
    <div class="card auth-card glass">
        <h2 class="text-center">Create Account</h2>
        <p class="text-center subtitle">Register to access the dashboard</p>
        
        <form action="{{ url_for('register') }}" method="POST" class="auth-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="you@domain.com">
            </div>
            
            <div class="form-group">
                <label for="password">Create Password</label>
                <input type="password" id="password" name="password" required placeholder="Secure password (at least 6 chars)">
            </div>
            
            <button type="submit" class="btn btn-primary w-100">Register</button>
        </form>
        
        <p class="auth-footer text-center">
            Already have an account? <a href="{{ url_for('login') }}">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
